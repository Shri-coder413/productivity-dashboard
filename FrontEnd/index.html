<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productivity Dashboard</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="shortcut icon" href="./assets/icons/productivity-icon.png" type="image/x-icon" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>

  <!-- ================= GLOBAL HEADER ================= -->
  <header class="app-header">
    <nav class="app-nav" aria-label="Primary Navigation">

      <div class="nav-left">
        <button id="menu-btn" aria-label="Open menu">
          <i class="ri-menu-2-line"></i>
        </button>
        <h1 class="app-title">Productivity Dashboard</h1>
      </div>

      <div class="nav-right">
        <button class="theme-toggle" aria-label="Toggle theme">
          <i class="ri-sun-line"></i>
        </button>
      </div>

    </nav>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="open" aria-label="App Sections">
      <ul>
        <li><button class="view-btn" data-view="home"><i class="ri-eye-line"></i> Vision Board</button></li>
        <li><button class="view-btn" data-view="todos"><i class="ri-list-check-3"></i> To Do List</button></li>
        <li><button class="view-btn" data-view="planner"><i class="ri-calendar-line"></i> Daily Planner</button></li>
        <li><button class="view-btn" data-view="quotes"><i class="ri-double-quotes-r"></i> Quotes</button></li>
        <li><button class="view-btn" data-view="pomodoro"><i class="ri-timer-line"></i> Pomodoro Timer</button></li>
        <li><button class="view-btn" data-view="habit"><i class="ri-focus-2-line"></i> Habit Tracker</button></li>
      </ul>
    </aside>
  </header>

  <!-- ================= MAIN APPLICATION ================= -->
  <main id="app">

    <!-- ================= HOME / VISION BOARD ================= -->
    <section id="home-view" class="app-view active" aria-labelledby="home-heading">
      <h2 id="home-heading" class="section-title">Vision Board</h2>

      <div id="vision-board" class="vision-grid">

        <article class="grid-card card--tall" data-index="0">
          <img src="./assets/images/vision-healthy.jpg" alt="Healthy lifestyle goal">
          <div class="card-overlay"></div>
          <div class="card-content">
            <h3 contenteditable="true">Health</h3>
            <button class="change-img-btn">Change Image</button>
            <input type="file" class="img-input" accept="image/*" hidden>
          </div>
        </article>

        <article class="grid-card card--wide" data-index="1">
          <img src="./assets/images/vision-success.jpg" alt="Happiness goal">
          <div class="card-overlay"></div>
          <div class="card-content">
            <h3 contenteditable="true">Happiness</h3>
            <button class="change-img-btn">Change Image</button>
            <input type="file" class="img-input" accept="image/*" hidden>
          </div>
        </article>

        <article class="grid-card" data-index="1">
          <img src="./assets/images/vision-relations.jpg" alt="Happiness goal">
          <div class="card-overlay"></div>
          <div class="card-content">
            <h3 contenteditable="true">Relationship</h3>
            <button class="change-img-btn">Change Image</button>
            <input type="file" class="img-input" accept="image/*" hidden>
          </div>
        </article>

        <article class="grid-card" data-index="1">
          <img src="./assets/images/vision-plane-1.jpg" alt="Happiness goal">
          <div class="card-overlay"></div>
          <div class="card-content">
            <h3 contenteditable="true">Travel</h3>
            <button class="change-img-btn">Change Image</button>
            <input type="file" class="img-input" accept="image/*" hidden>
          </div>
        </article>

        <article class="grid-card" data-index="1">
          <img src="./assets/images/vision-career.avif" alt="Happiness goal">
          <div class="card-overlay"></div>
          <div class="card-content">
            <h3 contenteditable="true">Career</h3>
            <button class="change-img-btn">Change Image</button>
            <input type="file" class="img-input" accept="image/*" hidden>
          </div>
        </article>

        <article class="grid-card" data-index="1">
          <img src="./assets/images/vision-home.jpg" alt="Happiness goal">
          <div class="card-overlay"></div>
          <div class="card-content">
            <h3 contenteditable="true">Wealth</h3>
            <button class="change-img-btn">Change Image</button>
            <input type="file" class="img-input" accept="image/*" hidden>
          </div>
        </article>

      </div>
    </section>

    <!-- ================= TODO VIEW ================= -->
    <section id="todos-view" class="app-view" hidden aria-labelledby="todos-heading">
      <header class="section-header">
        <h2 id="todos-heading">Task Manager</h2>
      </header>

      <div class="todo-layout">

        <!-- Add Task -->
        <section class="todo-add">
          <form id="task-form">
            <label for="task-input">Task</label>
            <input class="task-input" type="text" id="task-input" required />

            <label for="task-time">Duration (minutes)</label>
            <input class="task-input" type="number" id="task-time" min="1" required />

            <label for="task-priority">Priority</label>
            <select class="task-input" id="task-priority">
              <option value="1">HIGH</option>
              <option value="2">MEDIUM</option>
              <option value="3">LOW</option>
            </select>

            <button type="submit">Add Task</button>
          </form>
        </section>

        <!-- Task List -->
        <section class="todo-list-section">
          <div class="task-controls">
            <button data-filter="active" class="filter active">Active</button>
            <button data-filter="completed" class="filter">Completed</button>
          </div>

          <div class="task-list"></div>
          <p class="empty-state">No tasks yet.</p>
        </section>

      </div>
    </section>

    <!-- ================= DAILY PLANNER ================= -->
    <section id="planner-view" class="app-view" hidden aria-labelledby="planner-heading">
      <header class="section-header">
        <h2 id="planner-heading">Design The System</h2>
      </header>

      <div class="planner-wrapper"></div>
    </section>

    <!-- ================= QUOTES ================= -->
    <section id="quotes-view" class="app-view " aria-labelledby="quotes-heading">
      <header class="section-header">
        <h2 id="planner-heading">Quote of the Day</h2>
      </header>

      <div class="quote-wrapper">
        <div class="quote-container">
          <p class="quote-date">March 5 2026</p>

          <img id="left-quote-icon" src="./assets/icons/icons8-quote-100.png" alt="">
          <img id="right-quote-icon" src="./assets/icons/icons8-quote-100.png" alt="">

          <div class="quote-text">
            <h3>Just Click Me! To See Your Today's Quote</h3>
          </div>

          <div class="quote-author">
            <p>Shrinivas</p>
          </div>
        </div>
      </div>

    </section>

    <!-- ================= POMODORO ================= -->
    <section id="pomodoro-view" class="app-view" hidden aria-labelledby="pomodoro-heading">
      <header class="section-header">
        <h2 id="pomodoro-heading">Pomodoro Timer</h2>
      </header>

      <div class="pomodoro-wrapper">
        <div class="pomodoro-timer">
          <time id="timer-display">25:00</time>
          <div class="session">
            <h4>Deep Work</h4>
          </div>
        </div>

        <div class="pomodoro-controls">
          <button class="start-timer"><i class="ri-play-large-line"></i> Start</button>
          <button class="pause-timer" hidden><i class="ri-pause-line"></i> Pause</button>
          <button class="reset-timer"><i class="ri-refresh-line"></i> Reset</button>
        </div>

      </div>
    </section>

    <!-- ================= HABIT TRACKER ================= -->
    <section id="habit-view" class="app-view" hidden aria-labelledby="habit-heading">

      <header class="section-header">
        <h2>Habit Tracker</h2>
        <button id="add-habit-btn"><i class="ri-add-large-line"></i> Add Habit</button>
      </header>

      <div class="tracker"></div>

      <!-- Modal -->
      <div id="habit-modal" class="modal" hidden>
        <div class="modal-content">
          <h3>Add New Habit</h3>
          <form id="habit-form">
            <input type="text" id="habit-title" required />
            <button type="submit">Add</button>
            <button type="button" id="close-modal">Cancel</button>
          </form>
        </div>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>

</html>
